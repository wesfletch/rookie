syntax = "proto3";

import "nanopb.proto";
import "Vector3.proto";

// A single IMU reading.
// Complies with ROS REP 103.
message ImuReport
{
    option (nanopb_msgopt).msgid = 13;
    
    uint64 timestamp = 1;
    // Gyroscope data
    Vector3 angular_vel = 2;
    // Accelerometer data
    Vector3 linear_accel = 3;
    // IMU internal die temperature in C
    optional float imu_temp = 4;
}